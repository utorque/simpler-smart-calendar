<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes - Simpler Smart Calendar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid h-100 notes-root">
        <div class="row h-100">
            <!-- Left: notes list -->
            <div class="col-md-4 notes-list-panel">
                <div class="panel-header">
                    <h3 class="mb-3">Notes</h3>
                    <div class="d-flex gap-2 align-items-center">
                        <select id="spaceSwitcher" class="form-select form-select-sm" style="width:auto;"></select>
                        <button class="btn btn-sm btn-success" id="newNoteBtn" title="New note">
                            <i class="fas fa-plus"></i>
                        </button>
                        <a href="/" class="btn btn-sm btn-outline-secondary" title="Calendar">
                            <i class="fas fa-calendar"></i>
                        </a>
                        <button class="btn btn-sm btn-outline-secondary" id="logoutBtn">
                            <i class="fas fa-sign-out-alt"></i>
                        </button>
                    </div>
                </div>
                <div class="notes-container" id="notes-container">
                    <div class="text-center text-muted py-5" id="notesEmpty">
                        <i class="fas fa-sticky-note fa-3x mb-3"></i>
                        <p>No notes yet. Click + to capture a thought.</p>
                    </div>
                </div>
            </div>

            <!-- Right: editor -->
            <div class="col-md-8 notes-editor-panel">
                <div class="panel-header">
                    <input type="text" id="noteTitle" class="form-control" placeholder="Title (optional)">
                    <span id="saveIndicator" class="ms-2 small text-muted"></span>
                </div>
                <textarea id="noteEditor"></textarea>
                <div class="mt-2 d-flex gap-2">
                    <button class="btn btn-sm btn-outline-primary" id="addTaskBtn" disabled title="Select text first">
                        <i class="fas fa-plus-square"></i> Add as task
                    </button>
                    <button class="btn btn-sm btn-outline-warning" id="cleanifyBtn" disabled title="Cleanify this note">
                        <i class="fas fa-broom"></i> Cleanify
                    </button>
                    <button class="btn btn-sm btn-outline-secondary" id="undoCleanifyBtn" disabled title="Undo the last Cleanify">
                        <i class="fas fa-undo"></i> Undo Cleanify
                    </button>
                    <button class="btn btn-sm btn-outline-danger ms-auto" id="deleteNoteBtn" disabled>
                        <i class="fas fa-trash"></i> Delete
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
    <script src="/static/js/notes.js"></script>
</body>
</html>
